<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Wobbleton — Game Night</title>
<style>
  :root{
    --ink:#2e2440;          /* plum-navy panels (Wobbleton family) */
    --ink-soft:#3d3255;
    --paper:#fff7ec;        /* warm paper text */
    --honey:#f5b85c;        /* Player 1 */
    --mint:#9fe3c0;         /* Player 2 */
    --blush:#f4a6b0;
    --shadow: 0 10px 24px rgba(46,36,64,.35);
    --r: 18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#b7c4ef;touch-action:none;}
  body{font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", "Trebuchet MS", Verdana, sans-serif; color:var(--paper);}
  #scene{position:fixed;inset:0;display:block;width:100%;height:100%;}

  .chip{background:var(--ink);border-radius:var(--r);box-shadow:var(--shadow);padding:.6rem .95rem;}
  button{font:inherit;color:inherit;border:none;cursor:pointer;}

  /* ---------------- HUB ---------------- */
  #hub{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
       padding:max(14px, env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));gap:12px;
       transition:opacity .35s ease;}
  #hub.hidden{opacity:0;pointer-events:none;}
  #hubTitle{position:relative;width:100%;text-align:center;padding:0 64px;margin-bottom:auto;flex-shrink:0;margin-top:10px;}
  #hubTitle h1{margin:0;font-size:clamp(1.6rem,7vw,2.4rem);letter-spacing:.5px;color:var(--ink);
    text-shadow:0 2px 0 rgba(255,255,255,.55);}
  #hubTitle p{margin:.15rem 0 0;color:var(--ink-soft);font-size:.95rem;opacity:.85;}

  #scoreboard{display:flex;align-items:center;gap:.9rem;padding:.55rem 1.1rem;flex-shrink:0;}
  .scoreSide{display:flex;align-items:center;gap:.45rem;font-weight:700;font-size:1.15rem;}
  .face{width:26px;height:26px;border-radius:7px;position:relative;box-shadow:inset 0 -4px 0 rgba(0,0,0,.12);}
  .face::before,.face::after{content:"";position:absolute;top:9px;width:4px;height:6px;border-radius:2px;background:#2e2440;}
  .face::before{left:6px}.face::after{right:6px}
  .face.honey{background:var(--honey)} .face.mint{background:var(--mint)}
  #scoreDash{opacity:.5;font-weight:400;}

  #gameList{display:flex;flex-direction:column;gap:10px;width:min(420px,100%);overflow-y:auto;flex-shrink:1;padding:4px 0;touch-action:pan-y;-webkit-overflow-scrolling:touch;}
  #gameList::-webkit-scrollbar { display: none; }
  #gameList { -ms-overflow-style: none; scrollbar-width: none; }
  .gameCard{display:flex;align-items:center;gap:.9rem;text-align:left;width:100%;flex:none;
    background:var(--ink);border-radius:var(--r);box-shadow:var(--shadow);padding:.85rem 1rem;
    min-height:44px;transition:transform .12s ease;touch-action:manipulation;}
  .gameCard:active:not(.disabled){transform:scale(.97);}
  .gameCard.disabled{opacity:0.6;pointer-events:none;}
  .gameCard .ico{font-size:1.7rem;width:2.4rem;text-align:center;flex:none;}
  .gameCard b{display:block;font-size:1.05rem;}
  .gameCard span{display:block;font-size:.82rem;opacity:.75;margin-top:2px;}

  #muteBtn{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;width:44px;height:44px;
    border-radius:14px;background:var(--ink);box-shadow:var(--shadow);font-size:1.2rem;display:flex;
    align-items:center;justify-content:center;touch-action:manipulation;z-index:2;}

  /* ---------------- IN-GAME HUD ---------------- */
  #hud{position:fixed;inset:0;pointer-events:none;display:none;}
  #hud.on{display:block;}
  .pmsg{position:absolute;left:50%;transform:translateX(-50%);padding:.5rem 1rem;font-weight:700;
    font-size:1rem;white-space:nowrap;transition:opacity .2s;}
  #p1msg{bottom:calc(16px + env(safe-area-inset-bottom));}
  #p2msg{top:calc(16px + env(safe-area-inset-top));transform:translateX(-50%) rotate(180deg);}
  #p1msg.honeyTurn, #p2msg.mintTurn{outline:3px solid currentColor;}
  #centermsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:2.6rem;font-weight:800;color:var(--ink);text-shadow:0 2px 0 rgba(255,255,255,.6);
    pointer-events:none;transition:opacity .25s;}
  #backBtn{position:absolute;top:50%;left:10px;transform:translateY(-50%);pointer-events:auto;
    width:42px;height:42px;border-radius:14px;background:var(--ink);box-shadow:var(--shadow);
    font-size:1.15rem;display:flex;align-items:center;justify-content:center;opacity:.9;}

  .zoneFlash{position:fixed;width:70px;height:70px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(255,247,236,.85), rgba(255,247,236,0) 70%);
    transform:translate(-50%,-50%) scale(.4);animation:flash .35s ease-out forwards;}
  @keyframes flash{to{transform:translate(-50%,-50%) scale(1.6);opacity:0;}}

  /* ---------------- WIN BANNER ---------------- */
  #banner{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;background:rgba(46,36,64,.35);backdrop-filter:blur(2px);}
  #banner.on{display:flex;}
  #bannerCard{display:flex;flex-direction:column;align-items:center;gap:.7rem;padding:1.3rem 1.7rem;text-align:center;}
  #bannerText{font-size:1.35rem;font-weight:800;}
  #bannerSub{font-size:.9rem;opacity:.75;margin-top:-4px;}
  .bRow{display:flex;gap:10px;}
  .bBtn{padding:.6rem 1.2rem;border-radius:14px;font-weight:700;font-size:1rem;box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .bBtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .bBtn.go{background:var(--honey);color:var(--ink);}
  .bBtn.quiet{background:var(--ink-soft);color:var(--paper);}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<!-- HUB -->
<div id="hub">
  <div id="hubTitle">
    <h1>Wobbleton Game Night</h1>
    <p>Two villagers, one phone. Hold it between you.</p>
  </div>
  <div id="installPrompt" style="display:none; background:var(--honey); color:var(--ink); padding:8px 16px; border-radius:12px; font-weight:bold; font-size:0.9rem; text-align:center; box-shadow:var(--shadow);">
    <button id="installBtn">↓ Install App for best experience!</button>
  </div>
  <button id="muteBtn" aria-label="Toggle sound">🔊</button>
  <div id="scoreboard" class="chip">
    <div class="scoreSide"><div class="face honey"></div><span id="s1">0</span></div>
    <span id="scoreDash">wins</span>
    <div class="scoreSide"><span id="s2">0</span><div class="face mint"></div></div>
  </div>
  <div id="gameList">
    <button class="gameCard" data-game="tug"><span class="ico">🪢</span>
      <span><b>Tug o' Rope</b><span>Tap your half as fast as you can. Pull the knot home.</span></span></button>
    <button class="gameCard" data-game="draw"><span class="ico">🏮</span>
      <span><b>Lantern Draw</b><span>Wait for the lantern to glow… first tap wins. Jump early, you lose.</span></span></button>
    <button class="gameCard" data-game="toe"><span class="ico">🔳</span>
      <span><b>Boxy Toe</b><span>Take turns placing villagers. Three in a row wins.</span></span></button>
    
    <button class="gameCard" data-game="hockey"><span class="ico">🧊</span>
      <span><b>Frosty Pond</b><span>Slide left/right to deflect the lantern past the opponent!</span></span></button>
    <button class="gameCard" data-game="joust"><span class="ico">🪵</span>
      <span><b>Log Joust</b><span>Tap to lunge. Bump them off, but don't fall!</span></span></button>
    <button class="gameCard" data-game="firefly"><span class="ico">✨</span>
      <span><b>Firefly Catch</b><span>Tap glowing fireflies fast! Avoid the red ones!</span></span></button>
    <button class="gameCard" data-game="balloon"><span class="ico">🎈</span>
      <span><b>Balloon Pump</b><span>Hold to pump for points. Don't let it pop on your turn!</span></span></button>
    <button class="gameCard" data-game="snowball"><span class="ico">⛄</span>
      <span><b>Snowball Fight</b><span>Tap to throw exactly when the target is over them!</span></span></button>
    <button class="gameCard" data-game="chopper"><span class="ico">🪓</span>
      <span><b>Wood Chopper</b><span>Tap exactly on the beat when the circle hits center!</span></span></button>

    <button class="gameCard" data-game="four"><span class="ico">🧱</span>
      <span><b>Boxy Four</b><span>Take turns dropping villagers. Four in a row wins.</span></span></button>
    <button class="gameCard" data-game="race"><span class="ico">🚦</span>
      <span><b>Statue Race</b><span>Tap fast on green. Freeze on red or you'll slide back!</span></span></button>
    <button class="gameCard" data-game="match"><span class="ico">🎴</span>
      <span><b>Boxy Match</b><span>Flip two lanterns. Find the most matching pairs.</span></span></button>
  </div>
</div>

<!-- IN-GAME HUD -->
<div id="hud">
  <button id="backBtn" aria-label="Back to games">←</button>
  <div id="p1msg" class="pmsg chip">Honey</div>
  <div id="p2msg" class="pmsg chip">Mint</div>
  <div id="centermsg"></div>
</div>

<!-- WIN BANNER -->
<div id="banner">
  <div id="bannerCard" class="chip">
    <div id="bannerText">Honey wins!</div>
    <div id="bannerSub"></div>
    <div class="bRow">
      <button class="bBtn go" id="againBtn">Play again</button>
      <button class="bBtn quiet" id="hubBtn">Games</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ============================================================
   RENDERER / SCENE
============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb7c4ef);
scene.fog = new THREE.Fog(0xb7c4ef, 18, 42);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
const camTarget = {pos:new THREE.Vector3(0,9,9), look:new THREE.Vector3(0,1.4,0)};
const camLook = new THREE.Vector3(0,1.4,0);
camera.position.copy(camTarget.pos);

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect = w/h;
  if(w < h){
    camera.fov = 50 * (h/w) * 0.75; // dynamic fov for portrait
  } else {
    camera.fov = 50;
  }
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

/* Lights */
scene.add(new THREE.HemisphereLight(0xfff3e0, 0x8f86c9, 0.85));
const sun = new THREE.DirectionalLight(0xffe6bd, 0.9);
sun.position.set(6,12,5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-10; sun.shadow.camera.right=10;
sun.shadow.camera.top=10; sun.shadow.camera.bottom=-10;
scene.add(sun);

/* Floating island */
const island = new THREE.Group();
const grass = new THREE.Mesh(
  new THREE.CylinderGeometry(8.5, 7.6, 1.0, 24),
  new THREE.MeshLambertMaterial({color:0xa8d8a0})
);
grass.position.y = -0.5; grass.receiveShadow = true;
island.add(grass);
const dirt = new THREE.Mesh(
  new THREE.CylinderGeometry(7.6, 3.2, 3.4, 24),
  new THREE.MeshLambertMaterial({color:0x8a6f5c})
);
dirt.position.y = -2.7;
island.add(dirt);
scene.add(island);

/* Drifting clouds */
const clouds = [];
const cloudMat = new THREE.MeshLambertMaterial({color:0xffffff});
for(let i=0;i<6;i++){
  const g = new THREE.Group();
  for(let j=0;j<3;j++){
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.6-j*0.35, 0.55, 0.9), cloudMat);
    b.position.set(j*0.8-0.8, j*0.18, (j%2)*0.3);
    g.add(b);
  }
  g.position.set((Math.random()*2-1)*16, 3.5+Math.random()*4, -6-Math.random()*10);
  g.userData.speed = 0.25 + Math.random()*0.3;
  clouds.push(g); scene.add(g);
}

/* ============================================================
   BOXY VILLAGER — adapted from Wobbleton's boxy characters
============================================================ */
const INK = 0x2e2440, BLUSH = 0xf4a6b0;
function makeBoxy(color, scale=1){
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({color});
  const dark = new THREE.MeshLambertMaterial({color:INK});
  const blushM = new THREE.MeshLambertMaterial({color:BLUSH});

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.8,0.6), mat);
  body.position.y = 0.75; body.castShadow = true; g.add(body);

  const head = new THREE.Mesh(new THREE.BoxGeometry(0.78,0.7,0.7), mat);
  head.position.y = 1.55; head.castShadow = true; g.add(head);

  // face lives on head's front (+z)
  const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.09,0.16,0.05), dark);
  const eyeR = eyeL.clone();
  eyeL.position.set(-0.18, 0.05, 0.36); eyeR.position.set(0.18, 0.05, 0.36);
  head.add(eyeL); head.add(eyeR);
  const chL = new THREE.Mesh(new THREE.BoxGeometry(0.13,0.08,0.05), blushM);
  const chR = chL.clone();
  chL.position.set(-0.26,-0.12,0.36); chR.position.set(0.26,-0.12,0.36);
  head.add(chL); head.add(chR);

  // arms pivot at shoulder
  function arm(side){
    const pivot = new THREE.Group();
    pivot.position.set(0.55*side, 1.05, 0);
    const a = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.55,0.2), mat);
    a.position.y = -0.25; a.castShadow = true;
    pivot.add(a); g.add(pivot);
    return pivot;
  }
  const armL = arm(-1), armR = arm(1);

  const legL = new THREE.Mesh(new THREE.BoxGeometry(0.26,0.38,0.3), mat);
  legL.position.set(-0.22,0.19,0); legL.castShadow = true;
  const legR = legL.clone(); legR.position.x = 0.22;
  g.add(legL); g.add(legR);

  g.scale.setScalar(scale);
  return {group:g, body, head, armL, armR, t:Math.random()*6};
}

function idle(b, dt, speed=2, amp=0.05){
  b.t += dt;
  b.group.position.y = b.group.userData.baseY !== undefined
      ? b.group.userData.baseY + Math.sin(b.t*speed)*amp
      : Math.sin(b.t*speed)*amp;
  b.head.rotation.z = Math.sin(b.t*speed*0.7)*0.06;
  b.armL.rotation.x = Math.sin(b.t*speed)*0.15;
  b.armR.rotation.x = -Math.sin(b.t*speed)*0.15;
}
function cheer(b, dt){
  b.t += dt;
  const hop = Math.abs(Math.sin(b.t*6))*0.45;
  const base = b.group.userData.baseY || 0;
  b.group.position.y = base + hop;
  b.armL.rotation.z = -2.6; b.armR.rotation.z = 2.6;
  b.head.rotation.z = Math.sin(b.t*8)*0.12;
}
function sulk(b, dt){
  b.t += dt;
  b.armL.rotation.z = 0; b.armR.rotation.z = 0;
  b.armL.rotation.x = 0.35; b.armR.rotation.x = 0.35;
  b.head.rotation.x = 0.35;
  b.head.rotation.z = 0;
}
function resetPose(b){
  b.armL.rotation.set(0,0,0); b.armR.rotation.set(0,0,0);
  b.head.rotation.set(0,0,0); b.group.rotation.set(0,0,0);
}

const HONEY = 0xf5b85c, MINT = 0x9fe3c0;

/* Hub mascot */
const mascot = makeBoxy(0xf4a6b0, 1.3);
mascot.group.position.set(0,0,1.5);
mascot.group.userData.baseY = 0;
scene.add(mascot.group);

/* ============================================================
   CONFETTI
============================================================ */
const confetti = [];
const confMats = [HONEY, MINT, 0xf4a6b0, 0xcdd7f7, 0xfff7ec].map(c=>new THREE.MeshLambertMaterial({color:c}));
function popConfetti(x,y,z,n=40){
  for(let i=0;i<n;i++){
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.03), confMats[i%confMats.length]);
    m.position.set(x,y,z);
    m.userData.v = new THREE.Vector3((Math.random()-0.5)*5, 3+Math.random()*4, (Math.random()-0.5)*5);
    m.userData.spin = new THREE.Vector3(Math.random()*8, Math.random()*8, Math.random()*8);
    m.userData.life = 2.2;
    confetti.push(m); scene.add(m);
  }
}
function updateConfetti(dt){
  for(let i=confetti.length-1;i>=0;i--){
    const m = confetti[i];
    m.userData.v.y -= 9*dt;
    m.position.addScaledVector(m.userData.v, dt);
    m.rotation.x += m.userData.spin.x*dt;
    m.rotation.y += m.userData.spin.y*dt;
    m.userData.life -= dt;
    if(m.userData.life<=0){ scene.remove(m); confetti.splice(i,1); }
  }
}

/* ============================================================
   AUDIO — tiny procedural lo-fi, plus blips
============================================================ */
const AudioMod = (()=>{
  let ctx=null, master=null, muted=false, loopTimer=null;
  const scale = [0, 3, 5, 7, 10, 12, 15]; // minor pentatonic-ish, base A3
  function ensure(){
    if(ctx) return;
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0.5;
    master.connect(ctx.destination);
    startLoop();
  }
  function note(freq, dur=0.5, gain=0.08, type='triangle', when=0){
    if(!ctx||muted) return;
    const t = ctx.currentTime + when;
    const o = ctx.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 1800;
    o.connect(g); g.connect(f); f.connect(master);
    o.start(t); o.stop(t+dur+0.05);
  }
  function startLoop(){
    if(loopTimer) return;
    let step = 0;
    loopTimer = setInterval(()=>{
      if(muted || !ctx) return;
      if(step % 2 === 0){
        const semi = scale[Math.floor(Math.random()*scale.length)];
        note(220*Math.pow(2, semi/12), 0.9, 0.05);
      }
      if(step % 8 === 0) note(110, 1.6, 0.05, 'sine');
      step++;
    }, 620);
  }
  return {
    ensure,
    tap(){ ensure(); note(560+Math.random()*80, 0.09, 0.07, 'square'); },
    win(){ ensure(); [0,4,7,12].forEach((s,i)=>note(440*Math.pow(2,s/12), 0.5, 0.09, 'triangle', i*0.12)); },
    lose(){ ensure(); [7,3,0].forEach((s,i)=>note(220*Math.pow(2,s/12), 0.4, 0.08, 'triangle', i*0.14)); },
    glow(){ ensure(); note(880, 0.35, 0.12, 'sine'); },
    setMuted(m){ muted = m; },
    isMuted(){ return muted; }
  };
})();

/* ============================================================
   UI REFS + HELPERS
============================================================ */
const $ = id => document.getElementById(id);
const hubEl=$('hub'), hudEl=$('hud'), bannerEl=$('banner');
const p1msg=$('p1msg'), p2msg=$('p2msg'), centermsg=$('centermsg');
const scores = {p1:0, p2:0};
const P1 = {name:'Honey', color:HONEY, css:'#f5b85c'};
const P2 = {name:'Mint',  color:MINT,  css:'#9fe3c0'};

function setMsgs(m1, m2, c1, c2){
  p1msg.textContent = m1; p2msg.textContent = m2;
  p1msg.style.color = c1 || 'var(--paper)';
  p2msg.style.color = c2 || 'var(--paper)';
}
function setCenter(t){ centermsg.textContent = t; centermsg.style.opacity = t? 1:0; }
function flashAt(x,y){
  const d = document.createElement('div');
  d.className = 'zoneFlash'; d.style.left = x+'px'; d.style.top = y+'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 380);
}
function updateScoreboard(){ $('s1').textContent = scores.p1; $('s2').textContent = scores.p2; }

function showBanner(winner, sub){
  const t = $('bannerText');
  if(winner === 'tie'){ t.textContent = 'A cozy tie!'; t.style.color = 'var(--paper)'; }
  else{
    const p = winner==='p1' ? P1 : P2;
    t.textContent = p.name + ' wins!';
    t.style.color = p.css;
    scores[winner]++; updateScoreboard();
    AudioMod.win();
  }
  $('bannerSub').textContent = sub || '';
  bannerEl.classList.add('on');
}

/* ============================================================
   GAME MANAGER
============================================================ */
let mode = 'hub';        // hub | tug | draw | toe | four | race | match
let current = null;      // active game object
const RAYCAST_MODES = new Set(['toe','four','match']); // shared-board, turn-based tap

const games = {};        // filled below

function enterGame(name){
  hubEl.classList.add('hidden');
  hudEl.classList.add('on');
  bannerEl.classList.remove('on');
  mascot.group.visible = false;
  if(current) current.exit();
  mode = name; current = games[name];
  current.enter();
}
function backToHub(){
  if(current){ current.exit(); current = null; }
  mode = 'hub';
  hudEl.classList.remove('on');
  bannerEl.classList.remove('on');
  hubEl.classList.remove('hidden');
  mascot.group.visible = true;
  camTarget.pos.set(0,9,9); camTarget.look.set(0,1.4,0);
  setCenter('');
}

/* Shared countdown helper: returns a controller games can poll */
function makeCountdown(onGo){
  let t = 3.0;
  return {
    done:false,
    update(dt){
      if(this.done) return;
      const before = Math.ceil(t);
      t -= dt;
      const after = Math.ceil(t);
      if(after !== before && after > 0) AudioMod.tap();
      if(t <= 0){ this.done = true; setCenter('GO!'); AudioMod.glow(); setTimeout(()=>{ if(mode!=='hub') setCenter(''); }, 500); onGo(); }
      else setCenter('● '.repeat(Math.max(after,0)).trim());
    }
  };
}

/* ============================================================
   GAME 1 — TUG O' ROPE
============================================================ */
games.tug = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  const bHoney = makeBoxy(HONEY); bHoney.group.position.set(0,0,3.6);
  bHoney.group.rotation.y = Math.PI;           // faces the knot (−z)
  bHoney.group.userData.baseY = 0;
  const bMint = makeBoxy(MINT); bMint.group.position.set(0,0,-3.6);
  bMint.group.userData.baseY = 0;
  g.add(bHoney.group); g.add(bMint.group);

  const rope = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.07,5.6,8),
    new THREE.MeshLambertMaterial({color:0xc9a26b})
  );
  rope.rotation.x = Math.PI/2; rope.position.y = 1.0;
  g.add(rope);

  const knot = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.42,0.42),
    new THREE.MeshLambertMaterial({color:0xe4574e}));
  knot.position.y = 1.0; knot.castShadow = true;
  g.add(knot);

  // goal lines
  const lineMat1 = new THREE.MeshLambertMaterial({color:HONEY});
  const lineMat2 = new THREE.MeshLambertMaterial({color:MINT});
  const l1 = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.06,0.14), lineMat1);
  l1.position.set(0,0.18,2.2);
  const l2 = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.06,0.14), lineMat2);
  l2.position.set(0,0.18,-2.2);
  g.add(l1); g.add(l2);

  let tug = 0;              // −1 mint side … +1 honey side; win at ±1
  let phase = 'count';      // count | play | over
  let cd = null;
  const PULL = 0.055, RANGE = 2.2;

  return {
    enter(){
      g.visible = true;
      tug = 0; phase = 'count';
      resetPose(bHoney); resetPose(bMint);
      bHoney.group.rotation.y = Math.PI;
      knot.position.z = 0;
      camTarget.pos.set(0,12,6); camTarget.look.set(0,0.4,0);
      setMsgs('Tap! Tap! Tap!','Tap! Tap! Tap!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tap(player, x, y){
      if(phase !== 'play') return;
      AudioMod.tap(); flashAt(x,y);
      tug += (player === 'p1' ? PULL : -PULL);
      if(Math.abs(tug) >= 1){
        tug = Math.sign(tug);
        phase = 'over';
        const w = tug > 0 ? 'p1' : 'p2';
        const wb = w==='p1' ? bHoney : bMint;
        popConfetti(wb.group.position.x, 2, wb.group.position.z, 45);
        setTimeout(()=>showBanner(w, 'The knot crossed the line.'), 700);
      }
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      knot.position.z += ((tug*RANGE) - knot.position.z) * Math.min(1, dt*10);
      const lean = tug * 0.35;
      if(phase === 'play' || phase === 'count'){
        // grip pose, lean with advantage
        bHoney.armL.rotation.x = -1.2; bHoney.armR.rotation.x = -1.2;
        bMint.armL.rotation.x = -1.2;  bMint.armR.rotation.x = -1.2;
        bHoney.group.rotation.x = -lean*0.5;
        bMint.group.rotation.x  = -lean*0.5;
        idle(bHoney, dt, 10, 0.02); idle(bMint, dt, 10, 0.02);
        bHoney.armL.rotation.x = -1.2; bHoney.armR.rotation.x = -1.2; // re-assert after idle
        bMint.armL.rotation.x = -1.2;  bMint.armR.rotation.x = -1.2;
      } else if(phase==='over'){
        const winB = tug>0 ? bHoney : bMint, loseB = tug>0 ? bMint : bHoney;
        cheer(winB, dt); sulk(loseB, dt);
      }
    }
  };
})();

  let phase = 'count';   // count | wait | glow | over
  let waitT = 0, cd = null;

  function finish(winner, sub){
    phase = 'over';
    const wb = winner==='p1' ? bHoney : bMint;
    const lb = winner==='p1' ? bMint : bHoney;
    wb.t = 0; lb.t = 0;
    popConfetti(wb.group.position.x, 2, wb.group.position.z, 40);
    games.draw._winner = winner;
    setTimeout(()=>showBanner(winner, sub), 700);
  }

  return {
    _winner:null,
    enter(){
      g.visible = true;
      phase = 'count';
      lanternMat.emissive.setHex(0x000000); glowLight.intensity = 0;
      resetPose(bHoney); resetPose(bMint);
      bHoney.group.rotation.y = Math.PI*0.85; bMint.group.rotation.y = -Math.PI*0.15;

    },
    exit(){ g.visible = false; },
    tap(player, x, y){
      if(phase === 'wait'){
        // jumped early — opponent wins
        AudioMod.lose(); flashAt(x,y);
        finish(player==='p1' ? 'p2' : 'p1',
          (player==='p1'?P1.name:P2.name)+' tapped before the glow!');

          phase = 'glow';
          lanternMat.emissive.setHex(0xffa53d);
          glowLight.intensity = 2.2;

        glowLight.intensity = 2.0 + Math.sin(performance.now()*0.02)*0.5;
        idle(bHoney, dt, 6, 0.04); idle(bMint, dt, 6, 0.04);
      }
      else if(phase==='over'){
        const w = this._winner==='p1'?bHoney:bMint;
        const l = this._winner==='p1'?bMint:bHoney;
        cheer(w, dt); sulk(l, dt);
      }
    }
  };
})();

   GAME 3 — BOXY TOE
============================================================ */
games.toe = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  const tiles = [];           // 9 meshes, index r*3+c
  const tileMatA = new THREE.MeshLambertMaterial({color:0xd8bf9a});
  const tileMatB = new THREE.MeshLambertMaterial({color:0xcbb28c});
  const S = 1.7;
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const t = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.2,1.5), ((r+c)%2? tileMatA:tileMatB).clone());
    t.position.set((c-1)*S, 0.1, (r-1)*S);
    t.userData.idx = r*3+c;
    t.receiveShadow = true;
    tiles.push(t); g.add(t);
  }

  let board, turn, over, pieces = [];
  const ray = new THREE.Raycaster(), ndc = new THREE.Vector2();

  function turnMsgs(){
    if(turn==='p1') setMsgs('Your turn ▲','Waiting…', P1.css, 'var(--paper)');
    else            setMsgs('Waiting…','Your turn ▲', 'var(--paper)', P2.css);
  }
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function winner(){
    for(const L of LINES){
      const [a,b,c] = L;
      if(board[a] && board[a]===board[b] && board[b]===board[c]) return {p:board[a], line:L};
    }
    if(board.every(v=>v)) return {p:'tie'};
    return null;
  }

  return {
    enter(){
      g.visible = true;
      board = Array(9).fill(null); over = false;
      turn = Math.random()<0.5 ? 'p1':'p2';
      pieces.forEach(p=>g.remove(p.group)); pieces = [];
      tiles.forEach(t=>t.material.emissive && t.material.emissive.setHex(0x000000));
      camTarget.pos.set(0,11.5,3.2); camTarget.look.set(0,0,-0.2);
      turnMsgs(); setCenter('');
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tapXY(x, y){
      if(over) return;
      ndc.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
      ray.setFromCamera(ndc, camera);
      const hit = ray.intersectObjects(tiles)[0];
      if(!hit) return;
      const idx = hit.object.userData.idx;
      if(board[idx]) return;

      board[idx] = turn;
      AudioMod.tap(); flashAt(x,y);
      const piece = makeBoxy(turn==='p1'?HONEY:MINT, 0.5);
      piece.group.position.set(hit.object.position.x, 0.2, hit.object.position.z);
      piece.group.rotation.y = turn==='p1' ? Math.PI : 0; // face its owner
      piece.group.userData.baseY = 0.2;
      pieces.push(piece); g.add(piece.group);

      const w = winner();
      if(w){
        over = true;
        if(w.p !== 'tie'){
          w.line.forEach(i=>tiles[i].material.emissive.setHex(0x554400));
          popConfetti(0, 2.5, 0, 50);
          setTimeout(()=>showBanner(w.p, 'Three villagers in a row.'), 700);
        } else {
          setTimeout(()=>showBanner('tie', 'The board is full — split the pie.'), 500);
        }
      } else {
        turn = (turn==='p1') ? 'p2':'p1';
        turnMsgs();
      }
    },
    update(dt){
      pieces.forEach(p=>idle(p, dt, 2.5, 0.03));
    }
  };
})();

/* ============================================================
   GAME 4 — BOXY FOUR (connect-four)
============================================================ */
games.four = (()=>{
  const COLS = 7, ROWS = 6, S = 1.05;
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  const ox = -(COLS-1)*S/2, oz = -(ROWS-1)*S/2;

  const tileMatA = new THREE.MeshLambertMaterial({color:0xd8bf9a});
  const tileMatB = new THREE.MeshLambertMaterial({color:0xcbb28c});
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t = new THREE.Mesh(new THREE.BoxGeometry(S*0.94,0.18,S*0.94), ((r+c)%2? tileMatA:tileMatB));
    t.position.set(ox+c*S, 0.09, oz+r*S);
    t.receiveShadow = true;
    g.add(t);
  }
  // invisible tall column colliders — generous tap targets for thumbs
  const colMat = new THREE.MeshBasicMaterial({visible:false});
  const cols = [];
  for(let c=0;c<COLS;c++){
    const col = new THREE.Mesh(new THREE.BoxGeometry(S*0.98, 5, ROWS*S+0.4), colMat);
    col.position.set(ox+c*S, 2.2, 0);
    col.userData.col = c;
    cols.push(col); g.add(col);
  }

  let board, turn, over, pieces, dropCol;
  const ray = new THREE.Raycaster(), ndc = new THREE.Vector2();

  function turnMsgs(){
    if(turn==='p1') setMsgs('Your turn ▼','Waiting…', P1.css, 'var(--paper)');
    else            setMsgs('Waiting…','Your turn ▼', 'var(--paper)', P2.css);
  }
  function idx(r,c){ return r*COLS+c; }
  function lowestOpenRow(c){
    for(let r=0;r<ROWS;r++) if(!board[idx(r,c)]) return r;
    return -1;
  }
  const DIRS = [[1,0],[0,1],[1,1],[1,-1]];
  function checkWin(r,c,p){
    for(const [dc,dr] of DIRS){
      let n=1;
      for(let s=1;s<4;s++){ const rr=r+dr*s, cc=c+dc*s; if(rr<0||rr>=ROWS||cc<0||cc>=COLS||board[idx(rr,cc)]!==p) break; n++; }
      for(let s=1;s<4;s++){ const rr=r-dr*s, cc=c-dc*s; if(rr<0||rr>=ROWS||cc<0||cc>=COLS||board[idx(rr,cc)]!==p) break; n++; }
      if(n>=4) return true;
    }
    return false;
  }

  return {
    enter(){
      g.visible = true;
      board = Array(COLS*ROWS).fill(null); over = false; pieces = [];
      turn = Math.random()<0.5 ? 'p1':'p2';
      camTarget.pos.set(0,14.5,5.6); camTarget.look.set(0,0,-0.3);
      turnMsgs(); setCenter('');
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; pieces.forEach(p=>g.remove(p.group)); },
    tapXY(x, y){
      if(over) return;
      ndc.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
      ray.setFromCamera(ndc, camera);
      const hit = ray.intersectObjects(cols)[0];
      if(!hit) return;
      const c = hit.object.userData.col;
      const r = lowestOpenRow(c);
      if(r<0) return; // column full

      board[idx(r,c)] = turn;
      AudioMod.tap(); flashAt(x,y);
      const piece = makeBoxy(turn==='p1'?HONEY:MINT, 0.42);
      piece.group.position.set(ox+c*S, 4.6, oz+r*S);
      piece.group.userData.baseY = 0.22;
      piece.group.userData.target = 0.22;
      piece.group.rotation.y = turn==='p1' ? Math.PI : 0;
      pieces.push(piece); g.add(piece.group);

      if(checkWin(r,c,turn)){
        over = true;
        popConfetti(ox+c*S, 3, oz+r*S, 50);
        const w = turn;
        setTimeout(()=>showBanner(w, 'Four villagers in a row.'), 700);
      } else if(board.every(v=>v)){
        over = true;
        setTimeout(()=>showBanner('tie', 'Board\'s full — split the pie.'), 500);
      } else {
        turn = (turn==='p1') ? 'p2':'p1';
        turnMsgs();
      }
    },
    update(dt){
      pieces.forEach(p=>{
        const py = p.group.position.y;
        const ty = p.group.userData.baseY;
        p.group.position.y += (ty - py) * Math.min(1, dt*9);
        idle(p, dt, 2.3, 0.025);
      });
    }
  };
})();

/* ============================================================
   GAME 5 — STATUE RACE (red light / green light duel)
============================================================ */
games.race = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  const START_Z = 4.2, FINISH_Z = -5.2, LANE_X = 1.3;

  const bHoney = makeBoxy(HONEY, 0.85); bHoney.group.position.set(-LANE_X,0.15,START_Z);
  bHoney.group.rotation.y = Math.PI; bHoney.group.userData.baseY = 0.15;
  const bMint = makeBoxy(MINT, 0.85); bMint.group.position.set(LANE_X,0.15,START_Z);
  bMint.group.rotation.y = Math.PI; bMint.group.userData.baseY = 0.15;
  g.add(bHoney.group); g.add(bMint.group);

  // lane strips
  const laneMat = new THREE.MeshLambertMaterial({color:0xcbb28c});
  [-LANE_X, LANE_X].forEach(x=>{
    const lane = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, START_Z-FINISH_Z+1.5), laneMat);
    lane.position.set(x, 0.15, (START_Z+FINISH_Z)/2);
    lane.receiveShadow = true; g.add(lane);
  });

  // traffic light post
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.14,2.0,0.14), new THREE.MeshLambertMaterial({color:0x6b5646}));
  post.position.set(0, 1.0, -0.6); g.add(post);
  const lightMat = new THREE.MeshLambertMaterial({color:0x552222, emissive:0x000000});
  const lightBox = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.4), lightMat);
  lightBox.position.set(0, 2.15, -0.6); lightBox.castShadow = true; g.add(lightBox);
  const lightGlow = new THREE.PointLight(0xff5555, 0, 6);
  lightGlow.position.set(0,2.15,-0.6); g.add(lightGlow);

  // finish line
  const finMat = new THREE.MeshLambertMaterial({color:0xf5b85c});
  const finLine = new THREE.Mesh(new THREE.BoxGeometry(3.2,0.06,0.16), finMat);
  finLine.position.set(0,0.18,FINISH_Z); g.add(finLine);

  let phase='count', cd=null, light='red', lightT=0, over=null;
  let progress, stumbleT, winner;
  const TAP_STEP = 0.05, PENALTY = 0.16;

  function setLight(l){
    light = l;
    if(l==='green'){ lightMat.emissive.setHex(0x2fae4a); lightMat.color.setHex(0x3fce5a); lightGlow.color.setHex(0x5cff77); lightGlow.intensity = 2.0; AudioMod.glow(); lightT = 1.0+Math.random()*1.6; }
    else{ lightMat.emissive.setHex(0x552222); lightMat.color.setHex(0xc4443f); lightGlow.color.setHex(0xff5555); lightGlow.intensity = 1.4; lightT = 0.9+Math.random()*1.4; }
  }

  return {
    enter(){
      g.visible = true; phase='count'; over=null; winner=null;
      progress = {p1:0, p2:0}; stumbleT = {p1:0, p2:0};
      resetPose(bHoney); resetPose(bMint);
      bHoney.group.position.set(-LANE_X,0.15,START_Z); bMint.group.position.set(LANE_X,0.15,START_Z);
      bHoney.group.rotation.y = Math.PI; bMint.group.rotation.y = Math.PI;
      setLight('red');
      camTarget.pos.set(0,15,4); camTarget.look.set(0,0,0);
      setMsgs('Tap on GREEN!','Tap on GREEN!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tap(player, x, y){
      if(phase !== 'play') return;
      if(light==='green'){
        progress[player] = Math.min(1, progress[player]+TAP_STEP);
        AudioMod.tap(); flashAt(x,y);
      } else {
        progress[player] = Math.max(0, progress[player]-PENALTY);
        stumbleT[player] = 0.35;
        AudioMod.lose(); flashAt(x,y);
      }
      if(progress[player] >= 1 && phase==='play'){
        phase='over'; winner = player;
        const wb = player==='p1' ? bHoney : bMint;
        popConfetti(wb.group.position.x, 2, wb.group.position.z, 45);
        setTimeout(()=>showBanner(winner, 'First across the line.'), 700);
      }
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      else if(phase==='play'){
        lightT -= dt;
        if(lightT<=0) setLight(light==='green' ? 'red' : 'green');
      }
      ['p1','p2'].forEach(p=>{
        const b = p==='p1' ? bHoney : bMint;
        const z = START_Z + (FINISH_Z-START_Z)*progress[p];
        b.group.position.z += (z - b.group.position.z) * Math.min(1, dt*7);
        if(stumbleT[p] > 0){
          stumbleT[p] -= dt;
          b.group.rotation.x = -0.4 * Math.min(1, stumbleT[p]/0.35);
        } else {
          b.group.rotation.x += (0 - b.group.rotation.x) * Math.min(1, dt*6);
        }
        if(phase==='over'){
          if(p===winner) cheer(b, dt); else sulk(b, dt);
        } else {
          idle(b, dt, light==='green' ? 9 : 2.5, light==='green' ? 0.05 : 0.015);
        }
      });
    }
  };
})();

  const N = COLS*ROWS;

  const tileMatA = new THREE.MeshLambertMaterial({color:0xd8bf9a});
  const tileMatB = new THREE.MeshLambertMaterial({color:0xcbb28c});
  const coverMat = new THREE.MeshLambertMaterial({color:INK});
  const tiles = [], covers = [], gems = [];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const i = r*COLS+c;
    const px = ox+c*S, pz = oz+r*S;
    const t = new THREE.Mesh(new THREE.BoxGeometry(S*0.88,0.18,S*0.88), ((r+c)%2? tileMatA:tileMatB));
    t.position.set(px, 0.09, pz); t.receiveShadow = true; t.userData.idx = i;
    g.add(t); tiles.push(t);

    const gem = new THREE.Mesh(new THREE.SphereGeometry(0.4,14,12), new THREE.MeshLambertMaterial({color:0xffffff}));
    gem.position.set(px, 0.4, pz); gem.scale.setScalar(0.0001); gem.castShadow = true;
    g.add(gem); gems.push(gem);

    const cover = new THREE.Mesh(new THREE.BoxGeometry(S*0.8,0.4,S*0.8), coverMat);
    cover.position.set(px, 0.28, pz); cover.castShadow = true;
    g.add(cover); covers.push(cover);
  }

  let colorIdx, state, selection, phase, pauseT, turn, matchScore, pairsFound, over;
  const ray = new THREE.Raycaster(), ndc = new THREE.Vector2();

  function shuffledColors(){
    const arr = []; GEM_COLORS.forEach(c=>{ arr.push(c,c); });
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }
  function turnMsgs(){
    if(turn==='p1') setMsgs('Flip two ▲','Waiting…', P1.css, 'var(--paper)');
    else            setMsgs('Waiting…','Flip two ▲', 'var(--paper)', P2.css);
  }

  return {
    enter(){
      g.visible = true;
      colorIdx = shuffledColors();
      state = Array(N).fill('hidden');
      selection = []; phase = 'pick'; pauseT = 0; over = false;
      pairsFound = 0; matchScore = {p1:0, p2:0};
      turn = Math.random()<0.5 ? 'p1':'p2';
      for(let i=0;i<N;i++){
        gems[i].material.color.setHex(colorIdx[i]);
        gems[i].scale.setScalar(0.0001);
        covers[i].visible = true; covers[i].scale.set(1,1,1);
      }
      camTarget.pos.set(0,12,4); camTarget.look.set(0,0,-0.2);
      turnMsgs(); setCenter('');
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tapXY(x, y){
      if(over || phase !== 'pick') return;
      ndc.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
      ray.setFromCamera(ndc, camera);
      const hit = ray.intersectObjects(tiles)[0];
      if(!hit) return;
      const i = hit.object.userData.idx;
      if(state[i] !== 'hidden' || selection.includes(i)) return;

      state[i] = 'revealed'; covers[i].visible = false; selection.push(i);
      AudioMod.tap(); flashAt(x,y);

      if(selection.length === 2){
        const [a,b] = selection;
        if(colorIdx[a] === colorIdx[b]){
          state[a] = 'matched'; state[b] = 'matched';
          matchScore[turn]++; pairsFound++;
          selection = [];
          AudioMod.glow();
          if(pairsFound === GEM_COLORS.length){
            over = true;
            const w = matchScore.p1===matchScore.p2 ? 'tie' : (matchScore.p1>matchScore.p2?'p1':'p2');
            if(w!=='tie') popConfetti(0,2.5,0,50);
            setTimeout(()=>showBanner(w, matchScore.p1+' - '+matchScore.p2+' pairs'), 600);
          }
        } else {
          phase = 'pause'; pauseT = 0.85;
        }
      }
    },
    update(dt){
      if(phase==='pause'){
        pauseT -= dt;
        if(pauseT <= 0){
          selection.forEach(i=>{ state[i]='hidden'; covers[i].visible = true; });
          selection = [];
          turn = (turn==='p1') ? 'p2':'p1';
          turnMsgs();
          phase = 'pick';
        }
      }
      for(let i=0;i<N;i++){
        const targetScale = state[i]==='hidden' ? 0.0001 : 1;
        gems[i].scale.x += (targetScale - gems[i].scale.x) * Math.min(1, dt*10);
        gems[i].scale.y = gems[i].scale.z = gems[i].scale.x;
        if(state[i]==='matched') gems[i].position.y = 0.4 + Math.sin(performance.now()*0.004+i)*0.06;
      }
    }
  };
})();

games.hockey = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  const FIELD_W = 6, FIELD_H = 10;
  
  const ice = new THREE.Mesh(new THREE.BoxGeometry(FIELD_W, 0.2, FIELD_H), new THREE.MeshLambertMaterial({color:0xdbe6f2, transparent:true, opacity:0.8}));
  ice.position.y = 0.15; g.add(ice);

  const bHoney = makeBoxy(HONEY, 0.8); bHoney.group.position.set(0,0,FIELD_H/2-1);
  bHoney.group.rotation.y = Math.PI; bHoney.group.userData.baseY = 0.25;
  const bMint = makeBoxy(MINT, 0.8); bMint.group.position.set(0,0,-FIELD_H/2+1);
  bMint.group.rotation.y = 0; bMint.group.userData.baseY = 0.25;
  g.add(bHoney.group); g.add(bMint.group);

  const puckMat = new THREE.MeshLambertMaterial({color:0xffffff, emissive:0xffa53d});
  const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.15,16), puckMat);
  puck.position.y = 0.35; g.add(puck);

  const puckGlow = new THREE.PointLight(0xffc46b, 1.5, 4);
  puckGlow.position.y = 0.55; g.add(puckGlow);

  let puckV = new THREE.Vector2(0,0), phase = 'count', cd = null, over=false;
  let targetX = {p1:0, p2:0};

  return {
    enter(){
      g.visible = true; phase = 'count'; over = false;
      targetX = {p1:0, p2:0};
      bHoney.group.position.set(0,0.25,FIELD_H/2-1); bMint.group.position.set(0,0.25,-FIELD_H/2+1);
      puck.position.set(0, 0.35, 0); puckGlow.position.set(0,0.55,0);
      puckV.set((Math.random()-0.5)*2, (Math.random()>0.5?1:-1)*3).normalize().multiplyScalar(4);
      camTarget.pos.set(0, 15, 6); camTarget.look.set(0, 0, 0);
      setMsgs('Defend your goal!','Defend your goal!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tap(player, x, y){ this.drag(player, x, y); },
    drag(player, x, y){
      if(phase!=='play') return;
      const ndc = new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
      const ray = new THREE.Raycaster(); ray.setFromCamera(ndc, camera);
      const hit = ray.intersectObject(ice)[0];
      if(hit){
        targetX[player] = Math.max(-FIELD_W/2+0.5, Math.min(FIELD_W/2-0.5, hit.point.x));
      }
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      
      // Move paddles
      bHoney.group.position.x += (targetX.p1 - bHoney.group.position.x) * Math.min(1, dt*12);
      bMint.group.position.x += (targetX.p2 - bMint.group.position.x) * Math.min(1, dt*12);
      
      if(phase==='play'){
        // Move puck
        puck.position.x += puckV.x * dt;
        puck.position.z += puckV.y * dt;
        
        // Wall bounce
        if(puck.position.x < -FIELD_W/2+0.3){ puck.position.x = -FIELD_W/2+0.3; puckV.x *= -1; AudioMod.tap(); }
        if(puck.position.x > FIELD_W/2-0.3){ puck.position.x = FIELD_W/2-0.3; puckV.x *= -1; AudioMod.tap(); }
        
        // Paddle collision (simple AABB/Circle)
        const checkPaddle = (b, py) => {
          const dx = puck.position.x - b.group.position.x;
          const dz = puck.position.z - b.group.position.z;
          if(Math.abs(dx) < 1.0 && Math.abs(dz) < 0.6){
            puckV.y = py * Math.abs(puckV.y);
            puckV.x += dx * 2; // spin
            puckV.normalize().multiplyScalar(Math.min(9, puckV.length() + 0.3));
            AudioMod.glow();
          }
        };
        if(puckV.y > 0 && puck.position.z > FIELD_H/2-1.5) checkPaddle(bHoney, -1);
        if(puckV.y < 0 && puck.position.z < -FIELD_H/2+1.5) checkPaddle(bMint, 1);
        
        // Goal
        if(Math.abs(puck.position.z) > FIELD_H/2 + 0.5 && !over){
          over = true; phase = 'over';
          const winner = puck.position.z < 0 ? 'p1' : 'p2';
          popConfetti(puck.position.x, 2, puck.position.z, 40);
          setTimeout(()=>showBanner(winner, 'Goal!'), 500);
        }
      }
      puckGlow.position.x = puck.position.x; puckGlow.position.z = puck.position.z;
      idle(bHoney, dt, 4, 0.05); idle(bMint, dt, 4, 0.05);
      if(phase==='over'){
        const w = puck.position.z < 0 ? bHoney : bMint;
        const l = puck.position.z < 0 ? bMint : bHoney;
        cheer(w, dt); sulk(l, dt);
      }
    }
  };
})();

games.joust = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  
  const log = new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,6,12), new THREE.MeshLambertMaterial({color:0x6b5646}));
  log.rotation.x = Math.PI/2; log.position.y = 0.5; g.add(log);
  
  const bHoney = makeBoxy(HONEY, 0.9); bHoney.group.rotation.y = Math.PI; bHoney.group.userData.baseY = 1.3;
  const bMint = makeBoxy(MINT, 0.9); bMint.group.rotation.y = 0; bMint.group.userData.baseY = 1.3;
  g.add(bHoney.group); g.add(bMint.group);

  let pos = {p1: 2, p2: -2}, v = {p1: 0, p2: 0};
  let phase = 'count', cd = null, over = false;

  return {
    enter(){
      g.visible = true; phase = 'count'; over = false;
      pos = {p1: 2, p2: -2}; v = {p1: 0, p2: 0};
      bHoney.group.position.set(0, 1.3, pos.p1); bMint.group.position.set(0, 1.3, pos.p2);
      resetPose(bHoney); resetPose(bMint);
      bHoney.group.rotation.y = Math.PI; bMint.group.rotation.y = 0;
      camTarget.pos.set(6, 12, 0); camTarget.look.set(0, 0, 0);
      setMsgs('Tap to lunge!','Tap to lunge!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tap(player, x, y){
      if(phase!=='play') return;
      AudioMod.tap(); flashAt(x,y);
      v[player] += (player==='p1' ? -1.8 : 1.8);
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      
      if(phase==='play' || phase==='count'){
        v.p1 *= 0.85; v.p2 *= 0.85; // friction
        pos.p1 += v.p1 * dt; pos.p2 += v.p2 * dt;
        
        // collision
        if(pos.p1 - pos.p2 < 1.0){
          const mid = (pos.p1 + pos.p2) / 2;
          const push = (v.p1 + v.p2) * 0.5; // transfer momentum
          v.p1 = push * 0.5 + 1.0; v.p2 = push * 0.5 - 1.0; // bounce back slightly
          pos.p1 = mid + 0.5; pos.p2 = mid - 0.5;
          AudioMod.glow();
        }
        
        bHoney.group.position.z = pos.p1; bMint.group.position.z = pos.p2;
        
        // fall off
        if((pos.p1 > 3.2 || pos.p2 < -3.2) && !over){
          over = true; phase = 'over';
          const winner = pos.p1 > 3.2 ? 'p2' : 'p1';
          popConfetti(0, 2, winner==='p1'?2:-2, 40);
          setTimeout(()=>showBanner(winner, 'Knocked off the log!'), 700);
        }
        
        idle(bHoney, dt, 8, 0.05); idle(bMint, dt, 8, 0.05);
      } else if(phase==='over'){
        if(pos.p1 > 3.2) { bHoney.group.position.y -= 5*dt; bHoney.group.rotation.x += 3*dt; }
        else cheer(bHoney, dt);
        
        if(pos.p2 < -3.2) { bMint.group.position.y -= 5*dt; bMint.group.rotation.x -= 3*dt; }
        else cheer(bMint, dt);
      }
    }
  };
})();

games.firefly = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  RAYCAST_MODES.add('firefly');
  
  const flies = [];
  for(let i=0;i<10;i++){
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), new THREE.MeshLambertMaterial({color:0xffd700, emissive:0xffa53d}));
    m.visible = false; m.userData = {active:false, type:'good', t:0, side:''};
    g.add(m); flies.push(m);
  }

  let score = {p1:0, p2:0}, phase = 'count', cd = null, over=false;
  let spawnTimer = 0;

  return {
    enter(){
      g.visible = true; phase = 'count'; over = false;
      score = {p1:0, p2:0}; spawnTimer = 0;
      flies.forEach(f=>{ f.visible=false; f.userData.active=false; });
      camTarget.pos.set(0, 16, 2); camTarget.look.set(0, 0, 0);
      setMsgs('0','0', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; setCenter(''); });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tapXY(x, y){
      if(phase!=='play') return;
      const ndc = new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
      const ray = new THREE.Raycaster(); ray.setFromCamera(ndc, camera);
      const hits = ray.intersectObjects(flies.filter(f=>f.userData.active));
      if(hits.length > 0){
        const f = hits[0].object;
        f.userData.active = false; f.visible = false;
        AudioMod.tap(); flashAt(x,y);
        const player = (y > window.innerHeight/2) ? 'p1' : 'p2';
        
        if(f.userData.type === 'bad'){
          score[player] = Math.max(0, score[player] - 2);
          AudioMod.lose();
        } else {
          score[player]++;
        }
        setMsgs(score.p1, score.p2, P1.css, P2.css);
        
        if(score[player] >= 15 && !over){
          over = true; phase = 'over';
          popConfetti(0, 3, player==='p1'?2:-2, 50);
          setTimeout(()=>showBanner(player, 'Caught 15 fireflies!'), 500);
        }
      }
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      
      if(phase==='play'){
        spawnTimer -= dt;
        if(spawnTimer <= 0){
          spawnTimer = 0.3 + Math.random()*0.5;
          const inactive = flies.filter(f=>!f.userData.active);
          if(inactive.length > 0){
            const f = inactive[0];
            f.userData.active = true; f.visible = true;
            f.userData.t = 1.5 + Math.random()*1.5; // lifespan
            f.userData.type = Math.random()>0.8 ? 'bad' : 'good';
            f.material.emissive.setHex(f.userData.type==='bad' ? 0xff0000 : 0xffa53d);
            f.material.color.setHex(f.userData.type==='bad' ? 0xff0000 : 0xffd700);
            
            const side = Math.random()>0.5 ? 'p1' : 'p2';
            f.position.set((Math.random()-0.5)*8, 0.5, (side==='p1'?1:-1)*(1 + Math.random()*4));
          }
        }
        
        flies.forEach(f=>{
          if(f.userData.active){
            f.userData.t -= dt;
            f.position.y = 0.5 + Math.sin(f.userData.t*5)*0.3;
            if(f.userData.t <= 0){ f.userData.active = false; f.visible = false; }
          }
        });
      }
    }
  };
})();

      g.visible = true; phase = 'count'; over = false;

      }

})();

games.snowball = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  
  const bHoney = makeBoxy(HONEY, 0.8); bHoney.group.position.set(0,0,4); bHoney.group.rotation.y = Math.PI;
  const bMint = makeBoxy(MINT, 0.8); bMint.group.position.set(0,0,-4); bMint.group.rotation.y = 0;
  g.add(bHoney.group); g.add(bMint.group);
  
  const wall = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 0.5), new THREE.MeshLambertMaterial({color:0xaaaaaa}));
  wall.position.y = 0.5; g.add(wall);

  const targets = {
    p1: new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 8, 24), new THREE.MeshBasicMaterial({color:0xff0000})),
    p2: new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 8, 24), new THREE.MeshBasicMaterial({color:0xff0000}))
  };
  targets.p1.rotation.x = Math.PI/2; targets.p1.position.set(0, 0.1, 4); g.add(targets.p1);
  targets.p2.rotation.x = Math.PI/2; targets.p2.position.set(0, 0.1, -4); g.add(targets.p2);

  const snowballs = [];

  let phase = 'count', cd = null, over=false;
  let targetT = 0;

  return {
    enter(){
      g.visible = true; phase = 'count'; over = false; targetT = 0;
      snowballs.forEach(s=>g.remove(s)); snowballs.length = 0;
      camTarget.pos.set(8, 12, 0); camTarget.look.set(0, 0, 0);
      setMsgs('Tap to throw!','Tap to throw!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; setCenter(''); });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; snowballs.forEach(s=>g.remove(s)); snowballs.length=0; },
    tap(player, x, y){
      if(phase!=='play') return;
      AudioMod.tap(); flashAt(x,y);
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshLambertMaterial({color:0xffffff}));
      const origin = player==='p1' ? bHoney.group.position.clone() : bMint.group.position.clone();
      const targetPos = player==='p1' ? targets.p2.position.clone() : targets.p1.position.clone();
      
      origin.y += 1;
      s.position.copy(origin);
      
      const dx = targetPos.x - origin.x;
      const dz = targetPos.z - origin.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const speed = 8;
      const time = dist / speed;
      
      s.userData = {
        vx: dx/time,
        vz: dz/time,
        vy: (0 - origin.y + 0.5 * 20 * time * time) / time, // arc
        t: 0,
        maxT: time,
        owner: player
      };
      g.add(s); snowballs.push(s);
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      
      if(phase==='play'){
        targetT += dt;
        targets.p1.position.x = Math.sin(targetT * 1.5) * 3;
        targets.p2.position.x = Math.cos(targetT * 1.7) * 3; // slightly different speed
        
        for(let i=snowballs.length-1; i>=0; i--){
          const s = snowballs[i];
          s.position.x += s.userData.vx * dt;
          s.position.y += s.userData.vy * dt;
          s.position.z += s.userData.vz * dt;
          s.userData.vy -= 20 * dt; // gravity
          s.userData.t += dt;
          
          if(s.userData.t >= s.userData.maxT){
            // hit ground
            const targetB = s.userData.owner==='p1' ? bMint : bHoney;
            const dist = new THREE.Vector2(s.position.x - targetB.group.position.x, s.position.z - targetB.group.position.z).length();
            
            if(dist < 1.0 && !over){
              over = true; phase = 'over';
              popConfetti(targetB.group.position.x, 2, targetB.group.position.z, 30);
              setTimeout(()=>showBanner(s.userData.owner, 'Direct hit!'), 500);
            }
            
            g.remove(s); snowballs.splice(i, 1);
          }
        }
      }
      idle(bHoney, dt, 4, 0.05); idle(bMint, dt, 4, 0.05);
    }
  };
})();

============================================================ */
games.chopper = (()=>{
  const g = new THREE.Group(); g.visible = false; scene.add(g);
  
  const bHoney = makeBoxy(HONEY, 0.9); bHoney.group.position.set(0,0,3); bHoney.group.rotation.y = Math.PI;
  const bMint = makeBoxy(MINT, 0.9); bMint.group.position.set(0,0,-3); bMint.group.rotation.y = 0;
  g.add(bHoney.group); g.add(bMint.group);

  const logMat = new THREE.MeshLambertMaterial({color:0x6b5646});
  const logs = {
    p1: new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1,12), logMat),
    p2: new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1,12), logMat)
  };
  logs.p1.position.set(0,0.5,1.5); logs.p1.rotation.z = Math.PI/2; g.add(logs.p1);
  logs.p2.position.set(0,0.5,-1.5); logs.p2.rotation.z = Math.PI/2; g.add(logs.p2);

  let phase = 'count', cd = null, over=false;
  let beatT = 0, beatInterval = 1.0, score = {p1:0, p2:0};

  return {
    enter(){
      g.visible = true; phase = 'count'; over = false;
      score = {p1:0, p2:0}; beatT = 0; beatInterval = 1.0;
      camTarget.pos.set(8, 12, 0); camTarget.look.set(0, 0, 0);
      setMsgs('Chop on the beat!','Chop on the beat!', P1.css, P2.css);
      cd = makeCountdown(()=>{ phase='play'; setCenter(''); });
      bannerEl.classList.remove('on');
    },
    exit(){ g.visible = false; },
    tap(player, x, y){
      if(phase!=='play') return;
      AudioMod.tap(); flashAt(x,y);
      const b = player==='p1'?bHoney:bMint;
      b.armR.rotation.x = -2; // chop animation
      
      // check timing
      const diff = Math.abs((beatT % beatInterval) - beatInterval/2);
      if(diff < 0.15){
        score[player]++;
        setMsgs(score.p1, score.p2, P1.css, P2.css);
        popConfetti(0, 2, player==='p1'?1.5:-1.5, 10);
        AudioMod.glow();
        if(score[player] >= 10 && !over){
          over = true; phase = 'over';
          setTimeout(()=>showBanner(player, 'Timber!'), 500);
        }
      } else {
        AudioMod.lose();
      }
    },
    update(dt){
      if(phase==='count' && cd) cd.update(dt);
      
      if(phase==='play'){
        beatT += dt;
        if(beatT > beatInterval){
          beatT -= beatInterval;
          beatInterval = Math.max(0.4, beatInterval - 0.05); // speeds up
          AudioMod.tap(); // metronome
        }
        
        // Visual indicator scale
        const scale = 1.0 + Math.abs((beatT % beatInterval) - beatInterval/2)*2;
        logs.p1.scale.set(1, scale, scale);
        logs.p2.scale.set(1, scale, scale);
      }
      
      bHoney.armR.rotation.x += (0 - bHoney.armR.rotation.x) * Math.min(1, dt*10);
      bMint.armR.rotation.x += (0 - bMint.armR.rotation.x) * Math.min(1, dt*10);
      idle(bHoney, dt, 4, 0.05); idle(bMint, dt, 4, 0.05);
    }
  };
})();

/* ============================================================
   INPUT — split-screen touch zones
   Bottom half = Player 1 (Honey), top half = Player 2 (Mint).
   Boxy Toe uses raycasting instead (turn-based, shared board).
============================================================ */
const activePointers = new Map();

window.addEventListener('pointerdown', (e)=>{
  AudioMod.ensure();
  if(mode === 'hub' || bannerEl.classList.contains('on')) return;
  if(e.target.closest('#backBtn')) return;
  
  activePointers.set(e.pointerId, (e.clientY > window.innerHeight/2) ? 'p1' : 'p2');
  if(RAYCAST_MODES.has(mode)){ current.tapXY && current.tapXY(e.clientX, e.clientY); return; }
  
  const player = activePointers.get(e.pointerId);
  current && current.tap && current.tap(player, e.clientX, e.clientY);
}, {passive:true});

window.addEventListener('pointermove', (e)=>{
  if(mode === 'hub' || bannerEl.classList.contains('on')) return;
  if(current && current.drag){
    const player = (e.clientY > window.innerHeight/2) ? 'p1' : 'p2';
    current.drag(player, e.clientX, e.clientY);
  }
}, {passive:true});

window.addEventListener('pointerup', (e)=>{
  const player = activePointers.get(e.pointerId);
  activePointers.delete(e.pointerId);
  if(mode === 'hub' || bannerEl.classList.contains('on')) return;
  if(current && current.release && player) current.release(player);
}, {passive:true});

window.addEventListener('pointercancel', (e)=>{
  const player = activePointers.get(e.pointerId);
  activePointers.delete(e.pointerId);
  if(current && current.release && player) current.release(player);
}, {passive:true});

['gesturestart','dblclick'].forEach(ev=>document.addEventListener(ev, e=>e.preventDefault()));

/* ============================================================
   MAIN LOOP
============================================================ */
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  // camera glide
  camera.position.lerp(camTarget.pos, Math.min(1, dt*3));
  camLook.lerp(camTarget.look, Math.min(1, dt*3));
  camera.lookAt(camLook);

  // ambient world
  island.position.y = Math.sin(performance.now()*0.0006)*0.12;
  clouds.forEach(c=>{
    c.position.x += c.userData.speed*dt;
    if(c.position.x > 18) c.position.x = -18;
  });
  if(mode === 'hub'){
    idle(mascot, dt, 2, 0.07);
    mascot.armR.rotation.z = 2.4 + Math.sin(performance.now()*0.006)*0.25; // waving
  }
  if(current) current.update(dt);
  updateConfetti(dt);

  renderer.render(scene, camera);
}
tick();

// --- PWA Support ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail:', err));
}
let deferredPrompt;
const installPrompt = $('installPrompt');
const installBtn = $('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installPrompt.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installPrompt.style.display = 'none';
    }
    deferredPrompt = null;
  }
});

const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);
if (isIos() && !isInStandaloneMode()) {
  installPrompt.style.display = 'block';
  installBtn.textContent = 'Tap Share ↑ -> Add to Home Screen';
  installBtn.style.pointerEvents = 'none';
}

})();
</script>
